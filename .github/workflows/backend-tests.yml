name: Backend Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2dream
          MYSQL_DATABASE: csc648_test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p2dream"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: application/Backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Create .env.test
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=2dream
          DB_NAME=csc648_test_db
          EOF

      - name: Wait for MySQL
        run: |
          until mysql -h 127.0.0.1 -uroot -p2dream -e "SELECT 1"; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Load test database schema
        run: |
          mysql -h 127.0.0.1 -uroot -p2dream csc648_test_db < database_test_setup.sql

      - name: Run tests
        run: npm test
